<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle ring decorations -->
  <circle cx="60"   cy="60"   r="320" fill="none" stroke="rgba(45,191,138,0.06)" stroke-width="1"/>
  <circle cx="1140" cy="570"  r="380" fill="none" stroke="rgba(45,191,138,0.06)" stroke-width="1"/>
  <circle cx="1140" cy="570"  r="260" fill="none" stroke="rgba(45,191,138,0.05)" stroke-width="1"/>

  <!-- Top mint bar -->
  <rect width="1200" height="5" fill="#2DBF8A"/>

  <!-- Globe mark -->
  <circle cx="600" cy="185" r="52" fill="rgba(45,191,138,0.12)"/>
  <circle cx="600" cy="185" r="52" fill="none" stroke="#2DBF8A" stroke-width="2.5"/>
  <ellipse cx="600" cy="185" rx="28" ry="52" fill="none" stroke="#2DBF8A" stroke-width="2"/>
  <line x1="548" y1="185" x2="652" y2="185" stroke="#2DBF8A" stroke-width="2"/>
  <line x1="552" y1="162" x2="648" y2="162" stroke="#2DBF8A" stroke-width="1.5"/>
  <line x1="552" y1="208" x2="648" y2="208" stroke="#2DBF8A" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="600" y="338"
    text-anchor="middle"
    font-family="Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="108" font-weight="800" letter-spacing="-5"
    fill="#f1f5f9">Visato</text>

  <!-- Tagline -->
  <text x="600" y="408"
    text-anchor="middle"
    font-family="Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="38" font-weight="400"
    fill="#94a3b8">Track your Schengen days. Travel freely.</text>

  <!-- Pills row -->
  <rect x="320" y="452" width="168" height="42" rx="21"
    fill="rgba(45,191,138,0.12)" stroke="rgba(45,191,138,0.35)" stroke-width="1.5"/>
  <text x="404" y="478"
    text-anchor="middle"
    font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif"
    font-size="21" font-weight="600" fill="#2DBF8A">90 / 180 rule</text>

  <rect x="506" y="452" width="200" height="42" rx="21"
    fill="rgba(45,191,138,0.12)" stroke="rgba(45,191,138,0.35)" stroke-width="1.5"/>
  <text x="606" y="478"
    text-anchor="middle"
    font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif"
    font-size="21" font-weight="600" fill="#2DBF8A">196 countries</text>

  <rect x="724" y="452" width="148" height="42" rx="21"
    fill="rgba(45,191,138,0.12)" stroke="rgba(45,191,138,0.35)" stroke-width="1.5"/>
  <text x="798" y="478"
    text-anchor="middle"
    font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif"
    font-size="21" font-weight="600" fill="#2DBF8A">100% free</text>

  <!-- URL footer -->
  <text x="600" y="588"
    text-anchor="middle"
    font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif"
    font-size="22" fill="rgba(148,163,184,0.45)">
    schengen-tracker-virid.vercel.app
  </text>
</svg>
