<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visato — Schengen Days Tracker</title>
    <meta name="description" content="Track your 90/180-day Schengen rule. Add trips, see days remaining, plan future stays. Supports 196 countries." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://schengen-tracker-virid.vercel.app" />
    <meta property="og:title" content="Visato — Schengen Days Tracker" />
    <meta property="og:description" content="Track your 90/180-day Schengen rule. Add trips, see days remaining, plan future stays. Supports 196 countries." />
    <meta property="og:image" content="https://schengen-tracker-virid.vercel.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Visato — Schengen Days Tracker" />
    <meta name="twitter:description" content="Track your 90/180-day Schengen rule. Add trips, see days remaining, plan future stays. Supports 196 countries." />
    <meta name="twitter:image" content="https://schengen-tracker-virid.vercel.app/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2DBF8A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Visato" />

    <script>
      // No-FOUC: apply theme before any CSS loads
      try {
        var s = JSON.parse(localStorage.getItem('schengen_settings') || '{}');
        var theme = s.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
